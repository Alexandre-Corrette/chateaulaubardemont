{{/* Schema.org JSON-LD — affiché uniquement sur la homepage */}}
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "name": "{{ site.Title }}",
      "url": "{{ site.BaseURL }}"
    },
    {
      "@type": ["LocalBusiness", "EventVenue"],
      "name": "Château de Laubardemont",
      "description": "{{ .Params.description }}",
      "url": "{{ site.BaseURL }}",
      "telephone": "+33{{ site.Params.contact.phone | replaceRE `^0` `` | replaceRE ` ` `` }}",
      "email": "{{ site.Params.contact.email }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Laubardemont",
        "addressLocality": "Sablons",
        "postalCode": "33910",
        "addressCountry": "FR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 44.9833,
        "longitude": -0.1833
      },
      "image": "{{ (resources.Get "images/chateau-facade.jpg").Permalink }}",
      "sameAs": [
        {{ with site.Params.social.instagram }}"{{ . }}"{{ end }}{{ with site.Params.social.facebook }},
        "{{ . }}"{{ end }}
      ],
      "priceRange": "€€€",
      "maximumAttendeeCapacity": 120
      {{ with site.Params.google_rating }},
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "{{ . }}",
        "bestRating": "5",
        "ratingCount": "{{ with site.Data.google_reviews }}{{ .total_reviews }}{{ else }}{{ len site.Params.avis }}{{ end }}"
      }
      {{ end }}
      {{ with site.Params.avis }},
      "review": [
        {{ range $i, $r := . }}{{ if $i }},{{ end }}
        {
          "@type": "Review",
          "author": { "@type": "Person", "name": "{{ $r.author }}" },
          "reviewRating": { "@type": "Rating", "ratingValue": "{{ $r.rating }}", "bestRating": "5" },
          "reviewBody": "{{ $r.text }}"
        }
        {{ end }}
      ]
      {{ end }}
    }
  ]
}
</script>
{{ end }}

{{/* BreadcrumbList — on all pages except homepage */}}
{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Accueil",
      "item": "{{ site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ end }}
