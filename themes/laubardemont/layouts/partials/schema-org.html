{{/* Schema.org JSON-LD — affiché uniquement sur la homepage */}}
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "name": "{{ site.Title }}",
      "url": "{{ site.BaseURL }}"
    },
    {
      "@type": ["LocalBusiness", "EventVenue"],
      "name": "{{ site.Params.propertyName }}",
      "description": "{{ .Params.description }}",
      "url": "{{ site.BaseURL }}",
      "telephone": "+33{{ site.Params.contact.phone | replaceRE `^0` `` | replaceRE ` ` `` }}",
      "email": "{{ site.Params.contact.email }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "{{ site.Params.address.street | default "" }}",
        "addressLocality": "{{ site.Params.address.city | default "" }}",
        "postalCode": "{{ site.Params.address.postalCode | default "" }}",
        "addressCountry": "{{ site.Params.address.country | default "FR" }}"
      },
      {{ with site.Params.geo }}
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": {{ .latitude }},
        "longitude": {{ .longitude }}
      },
      {{ end }}
      {{ with site.Params.heroImage }}"image": "{{ (resources.Get .).Permalink }}",{{ end }}
      "sameAs": [
        {{ with site.Params.social.instagram }}"{{ . }}"{{ end }}{{ with site.Params.social.facebook }},
        "{{ . }}"{{ end }}
      ],
      "priceRange": "{{ site.Params.priceRange | default "€€€" }}"
      {{ with site.Params.maximumAttendeeCapacity }},"maximumAttendeeCapacity": {{ . }}{{ end }}
      {{ with site.Params.google_rating }},
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "{{ . }}",
        "bestRating": "5",
        "ratingCount": "{{ with site.Data.google_reviews }}{{ .total_reviews }}{{ else }}{{ len site.Params.avis }}{{ end }}"
      }
      {{ end }}
      {{ with site.Params.avis }},
      "review": [
        {{ range $i, $r := . }}{{ if $i }},{{ end }}
        {
          "@type": "Review",
          "author": { "@type": "Person", "name": "{{ $r.author }}" },
          "reviewRating": { "@type": "Rating", "ratingValue": "{{ $r.rating }}", "bestRating": "5" },
          "reviewBody": "{{ $r.text }}"
        }
        {{ end }}
      ]
      {{ end }}
    }
  ]
}
</script>
{{ end }}

{{/* BreadcrumbList — on all pages except homepage */}}
{{/* LocalBusiness on /contact/ page */}}
{{ if eq .RelPermalink "/contact/" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "{{ site.Params.propertyName }}",
  "description": "{{ .Params.description }}",
  "url": "{{ site.BaseURL }}",
  "telephone": "+33{{ site.Params.contact.phone | replaceRE `^0` `` | replaceRE ` ` `` }}",
  "email": "{{ site.Params.contact.email }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ site.Params.address.street | default "" }}",
    "addressLocality": "{{ site.Params.address.city | default "" }}",
    "postalCode": "{{ site.Params.address.postalCode | default "" }}",
    "addressRegion": "{{ site.Params.address.region | default "" }}",
    "addressCountry": "{{ site.Params.address.country | default "FR" }}"
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+33{{ site.Params.contact.phone | replaceRE `^0` `` | replaceRE ` ` `` }}",
    "email": "{{ site.Params.contact.email }}",
    "contactType": "reservations",
    "availableLanguage": ["French", "English"]
  }
}
</script>
{{ end }}

{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Accueil",
      "item": "{{ site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ end }}
