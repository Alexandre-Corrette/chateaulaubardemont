<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode site.Language.Lang }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="bg-stone-100">

  {{/* Burger toggle — au top level du body */}}
  <input id="burger-toggle" class="burger-toggle" type="checkbox" />
  <label class="burger-overlay" for="burger-toggle" aria-hidden="true"></label>
  <nav class="burger-panel" aria-label="Navigation mobile">
    <label class="burger-close" for="burger-toggle" aria-label="Fermer le menu">×</label>
    <ul>
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>

  <header class="relative z-50">
    {{ partial "header.html" . }}
  </header>

  {{ if not .IsHome }}
  <nav aria-label="Fil d'Ariane" class="px-4 py-3 md:px-8">
    <ol class="mx-auto flex max-w-5xl items-center gap-2 text-xs text-stone-500">
      <li><a href="/" class="transition hover:text-amber-500">Accueil</a></li>
      <li class="before:mr-2 before:content-['›']">
        <span class="text-stone-700" aria-current="page">{{ .Title }}</span>
      </li>
    </ol>
  </nav>
  {{ end }}

  <main class="w-full mx-auto">
    {{ block "main" . }}
    {{ end }}
  </main>

  <footer>
    {{ partial "footer.html" . }}
  </footer>

</body>
</html>
