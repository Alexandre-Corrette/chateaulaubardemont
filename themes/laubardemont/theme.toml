description = 'A Hugo theme for wedding venues and event spaces. Features contact form with PHP backend, Google reviews, hero sliders, photo galleries, and structured data (Schema.org).'
min_version = '0.116.0'

homepage = 'https://github.com/Alexandre-Corrette/hugo-starter-venue'

tags = ['wedding', 'venue', 'events', 'contact-form', 'tailwind', 'responsive']
features = ['contact-form', 'google-reviews', 'hero-slider', 'photo-gallery', 'schema-org', 'tailwind-css']

[author]
  name = 'Alexandre Corrette'
  homepage = 'https://github.com/Alexandre-Corrette'
